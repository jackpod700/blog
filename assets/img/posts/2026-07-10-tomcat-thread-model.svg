<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 1440 1040" role="img" aria-labelledby="title desc">
  <title id="title">Tomcat NIO와 Spring MVC의 요청 처리 스레드 구조</title>
  <desc id="desc">클라이언트 연결을 Acceptor와 Poller가 관리하고, SocketProcessor가 Executor에 제출된 뒤 worker thread가 Coyote, Catalina, Filter, DispatcherServlet, Controller, Service와 Repository를 실행하는 흐름이다. 연결 포화 시 OS backlog는 acceptCount의 영향을 받고 worker 포화 시 TaskQueue는 maxQueueSize의 영향을 받는다.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="blue-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 34px Arial, 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 17px Arial, 'Noto Sans KR', sans-serif; fill: #475569; }
      .band-title { font: 800 20px Arial, 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .label { font: 700 19px Arial, 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .small { font: 600 15px Arial, 'Noto Sans KR', sans-serif; fill: #334155; }
      .tiny { font: 500 13px Arial, 'Noto Sans KR', sans-serif; fill: #475569; }
      .white { fill: #ffffff; }
      .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .client { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; }
      .network { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; }
      .backlog { fill: #fffbeb; stroke: #d97706; stroke-width: 2; }
      .executor { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; }
      .queue { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .worker { fill: #ffedd5; stroke: #f97316; stroke-width: 1.8; }
      .spring { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2.5; }
      .spring-box { fill: #ffffff; stroke: #4ade80; stroke-width: 1.8; }
      .downstream { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
      .async { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .shadow { filter: url(#shadow); }
      .arrow { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .blue-arrow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#blue-arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="1040"/>

  <text class="title" x="720" y="50" text-anchor="middle">Tomcat NIO와 Spring MVC 스레드 구조</text>
  <text class="subtitle" x="720" y="80" text-anchor="middle">연결은 Acceptor와 Poller가 관리하고, worker가 실제 Servlet과 Spring 코드를 실행한다.</text>

  <rect class="band shadow" x="48" y="112" width="1344" height="236" rx="8"/>
  <text class="band-title" x="76" y="145">1. Connection Layer</text>
  <text class="tiny" x="76" y="170">TCP 연결과 소켓 이벤트를 관리한다.</text>

  <rect class="client" x="82" y="202" width="154" height="82" rx="8"/>
  <text class="label" x="159" y="235" text-anchor="middle">Client</text>
  <text class="small" x="159" y="262" text-anchor="middle">HTTP 요청</text>

  <rect class="network" x="318" y="190" width="172" height="106" rx="8"/>
  <text class="label" x="404" y="226" text-anchor="middle">Acceptor</text>
  <text class="small" x="404" y="253" text-anchor="middle">TCP 연결 수락</text>
  <text class="tiny" x="404" y="278" text-anchor="middle">애플리케이션 코드 실행 안 함</text>

  <rect class="network" x="574" y="180" width="218" height="126" rx="8"/>
  <text class="label" x="683" y="216" text-anchor="middle">Poller</text>
  <text class="small" x="683" y="244" text-anchor="middle">Selector로 소켓 감시</text>
  <text class="tiny" x="683" y="270" text-anchor="middle">read / write ready 감지</text>
  <text class="tiny" x="683" y="291" text-anchor="middle">idle keep-alive 연결 관리</text>

  <rect class="backlog" x="1018" y="185" width="314" height="116" rx="8"/>
  <text class="label" x="1175" y="219" text-anchor="middle">OS Listen Backlog</text>
  <text class="small" x="1175" y="247" text-anchor="middle">maxConnections 도달 후 새 연결 대기</text>
  <text class="tiny" x="1175" y="275" text-anchor="middle">acceptCount가 크기에 관여, OS가 다르게 적용 가능</text>

  <path class="arrow" d="M 236 243 L 310 243"/>
  <path class="arrow" d="M 490 243 L 566 243"/>
  <path class="dash" d="M 1018 211 C 900 144 620 144 404 182"/>
  <text class="tiny" x="760" y="130" text-anchor="middle">maxConnections 도달 시 backlog에서 기다린 뒤 Acceptor로 이동</text>
  <text class="tiny" x="410" y="329" text-anchor="middle">accepted connections ≤ maxConnections</text>
  <text class="tiny" x="720" y="329" text-anchor="middle">keep-alive 응답 후 Poller에 다시 등록</text>

  <rect class="band shadow" x="48" y="372" width="1344" height="264" rx="8"/>
  <text class="band-title" x="76" y="407">2. Execution Layer</text>
  <text class="tiny" x="76" y="432">처리할 소켓 이벤트를 작업으로 만들고 worker에 배정한다.</text>

  <rect class="network" x="94" y="476" width="214" height="96" rx="8"/>
  <text class="label" x="201" y="511" text-anchor="middle">SocketProcessor</text>
  <text class="small" x="201" y="540" text-anchor="middle">Runnable 요청 작업</text>

  <rect class="executor" x="380" y="444" width="958" height="162" rx="8"/>
  <text class="label" x="414" y="476">Executor</text>

  <rect class="queue" x="428" y="520" width="252" height="62" rx="8"/>
  <text class="small" x="554" y="546" text-anchor="middle">TaskQueue</text>
  <text class="tiny" x="554" y="568" text-anchor="middle">대기 작업 ≤ maxQueueSize</text>

  <rect class="worker" x="792" y="504" width="132" height="78" rx="8"/>
  <text class="small" x="858" y="534" text-anchor="middle">Worker 1</text>
  <text class="tiny" x="858" y="558" text-anchor="middle">exec-1</text>

  <rect class="worker" x="944" y="504" width="132" height="78" rx="8"/>
  <text class="small" x="1010" y="534" text-anchor="middle">Worker 2</text>
  <text class="tiny" x="1010" y="558" text-anchor="middle">exec-2</text>

  <rect class="worker" x="1096" y="504" width="190" height="78" rx="8"/>
  <text class="small" x="1191" y="534" text-anchor="middle">Worker N</text>
  <text class="tiny" x="1191" y="558" text-anchor="middle">N ≤ maxThreads</text>

  <path class="arrow" d="M 683 306 L 683 358 L 201 358 L 201 468"/>
  <path class="arrow" d="M 308 524 L 372 524"/>
  <path class="blue-arrow" d="M 380 524 C 520 486 690 486 784 522"/>
  <path class="arrow" d="M 688 551 L 784 551"/>
  <rect x="516" y="489" width="268" height="24" rx="4" fill="#fff7ed"/>
  <text class="tiny" x="650" y="508" text-anchor="middle">여유 worker 또는 maxThreads까지 생성</text>
  <text class="tiny" x="732" y="579" text-anchor="middle">queue에서 worker 반환 대기</text>

  <rect class="spring shadow" x="48" y="662" width="1344" height="190" rx="8"/>
  <text class="band-title" x="76" y="697">3. Synchronous Request</text>
  <text class="tiny" x="76" y="722">같은 worker thread가 Coyote부터 Spring 비즈니스 코드까지 호출 스택을 이어 간다.</text>

  <rect class="spring-box" x="82" y="757" width="164" height="60" rx="8"/>
  <text class="small" x="164" y="783" text-anchor="middle">Coyote</text>
  <text class="tiny" x="164" y="805" text-anchor="middle">HTTP 처리</text>

  <rect class="spring-box" x="282" y="757" width="164" height="60" rx="8"/>
  <text class="small" x="364" y="783" text-anchor="middle">Catalina</text>
  <text class="tiny" x="364" y="805" text-anchor="middle">Servlet 선택</text>

  <rect class="spring-box" x="482" y="757" width="164" height="60" rx="8"/>
  <text class="small" x="564" y="783" text-anchor="middle">Filter Chain</text>
  <text class="tiny" x="564" y="805" text-anchor="middle">공통 처리</text>

  <rect class="spring-box" x="682" y="757" width="188" height="60" rx="8"/>
  <text class="small" x="776" y="783" text-anchor="middle">DispatcherServlet</text>
  <text class="tiny" x="776" y="805" text-anchor="middle">Spring MVC 입구</text>

  <rect class="spring-box" x="906" y="757" width="196" height="60" rx="8"/>
  <text class="small" x="1004" y="783" text-anchor="middle">Controller / Service</text>
  <text class="tiny" x="1004" y="805" text-anchor="middle">비즈니스 로직</text>

  <rect class="spring-box" x="1138" y="757" width="210" height="60" rx="8"/>
  <text class="small" x="1243" y="783" text-anchor="middle">Repository / Client</text>
  <text class="tiny" x="1243" y="805" text-anchor="middle">blocking I/O 가능</text>

  <path class="blue-arrow" d="M 1191 582 L 1191 642 L 164 642 L 164 749"/>
  <path class="arrow" d="M 246 787 L 274 787"/>
  <path class="arrow" d="M 446 787 L 474 787"/>
  <path class="arrow" d="M 646 787 L 674 787"/>
  <path class="arrow" d="M 870 787 L 898 787"/>
  <path class="arrow" d="M 1102 787 L 1130 787"/>

  <rect class="downstream" x="922" y="908" width="202" height="68" rx="8"/>
  <text class="label" x="1023" y="936" text-anchor="middle">DB Pool</text>
  <text class="tiny" x="1023" y="959" text-anchor="middle">connection / query 대기</text>

  <rect class="downstream" x="1152" y="908" width="240" height="68" rx="8"/>
  <text class="label" x="1272" y="936" text-anchor="middle">External API Pool</text>
  <text class="tiny" x="1272" y="959" text-anchor="middle">connect / response 대기</text>

  <path class="arrow" d="M 1243 817 L 1243 870 L 1023 870 L 1023 900"/>
  <path class="arrow" d="M 1243 870 L 1272 870 L 1272 900"/>
  <text class="small" x="1148" y="896" text-anchor="middle">대기 중에도 플랫폼 worker 점유</text>

  <rect class="async" x="48" y="892" width="810" height="84" rx="8"/>
  <text class="label" x="76" y="924">Servlet Async / Virtual Thread</text>
  <text class="tiny" x="76" y="950">Servlet async: container worker 반환 후 별도 실행, 결과가 준비되면 ASYNC dispatch</text>
  <text class="tiny" x="76" y="970">Virtual thread: blocking 대기 비용은 줄지만 DB, 외부 API와 CPU의 용량은 그대로</text>

  <text class="tiny" x="720" y="1014" text-anchor="middle">실선: 정상 처리 경로 · 점선: 연결 포화 시 backlog 경로</text>
</svg>
