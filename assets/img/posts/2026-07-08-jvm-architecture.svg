<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">JVM 전체 구조</title>
  <desc id="desc">Java source code is compiled to bytecode, loaded by the JVM class loader, stored in runtime data areas, executed by the execution engine, and managed by garbage collection before running on the operating system and hardware.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 36px Arial, 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, 'Noto Sans KR', sans-serif; fill: #475569; }
      .label { font: 700 21px Arial, 'Noto Sans KR', sans-serif; fill: #0f172a; }
      .small { font: 500 16px Arial, 'Noto Sans KR', sans-serif; fill: #334155; }
      .tiny { font: 500 14px Arial, 'Noto Sans KR', sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .jvm { fill: #eef6ff; stroke: #2563eb; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .section { fill: #ffffff; stroke: #93c5fd; stroke-width: 2; rx: 14; }
      .memory { fill: #f0fdf4; stroke: #22c55e; stroke-width: 2; rx: 14; }
      .engine { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 14; }
      .gc { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 14; }
      .arrow { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .muted-line { stroke: #cbd5e1; stroke-width: 1.5; }
      .pill { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1.5; rx: 12; }
      .thread { fill: #fefce8; stroke: #eab308; stroke-width: 1.5; rx: 10; }
      .heap { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 10; }
      .method { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; rx: 10; }
      .native { fill: #ffedd5; stroke: #ea580c; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="900"/>

  <text class="title" x="640" y="58" text-anchor="middle">JVM 전체 구조</text>
  <text class="subtitle" x="640" y="90" text-anchor="middle">소스 코드가 바이트코드가 되고, JVM 내부에서 로드, 메모리 관리, 실행, GC를 거쳐 동작한다.</text>

  <rect class="box" x="54" y="152" width="170" height="86"/>
  <text class="label" x="139" y="185" text-anchor="middle">Java Source</text>
  <text class="small" x="139" y="213" text-anchor="middle">.java</text>

  <rect class="box" x="278" y="152" width="150" height="86"/>
  <text class="label" x="353" y="185" text-anchor="middle">javac</text>
  <text class="small" x="353" y="213" text-anchor="middle">컴파일</text>

  <rect class="box" x="482" y="152" width="170" height="86"/>
  <text class="label" x="567" y="185" text-anchor="middle">Bytecode</text>
  <text class="small" x="567" y="213" text-anchor="middle">.class</text>

  <path class="arrow" d="M 224 195 L 270 195"/>
  <path class="arrow" d="M 428 195 L 474 195"/>

  <rect class="jvm" x="92" y="302" width="1096" height="456"/>
  <text class="label" x="640" y="340" text-anchor="middle">JVM</text>

  <path class="arrow" d="M 567 238 L 567 286 L 250 286 L 250 320"/>

  <rect class="section" x="128" y="374" width="244" height="268"/>
  <text class="label" x="250" y="409" text-anchor="middle">Class Loader</text>
  <text class="small" x="250" y="441" text-anchor="middle">클래스 로딩</text>
  <line class="muted-line" x1="154" y1="462" x2="346" y2="462"/>
  <text class="tiny" x="250" y="496" text-anchor="middle">Loading</text>
  <text class="tiny" x="250" y="528" text-anchor="middle">Linking</text>
  <text class="tiny" x="250" y="560" text-anchor="middle">Initialization</text>
  <text class="tiny" x="250" y="603" text-anchor="middle">필요한 class를 찾아</text>
  <text class="tiny" x="250" y="626" text-anchor="middle">JVM 안으로 올린다</text>

  <rect class="memory" x="426" y="374" width="404" height="268"/>
  <text class="label" x="628" y="409" text-anchor="middle">Runtime Data Area</text>
  <text class="small" x="628" y="441" text-anchor="middle">JVM 메모리 영역</text>

  <rect class="method" x="454" y="472" width="158" height="74"/>
  <text class="small" x="533" y="502" text-anchor="middle">Method Area</text>
  <text class="tiny" x="533" y="526" text-anchor="middle">클래스 정보</text>

  <rect class="heap" x="644" y="472" width="158" height="74"/>
  <text class="small" x="723" y="502" text-anchor="middle">Heap</text>
  <text class="tiny" x="723" y="526" text-anchor="middle">객체 / 배열</text>

  <rect class="thread" x="454" y="570" width="104" height="46"/>
  <text class="tiny" x="506" y="590" text-anchor="middle">Java Stack</text>
  <text class="tiny" x="506" y="608" text-anchor="middle">스레드별</text>

  <rect class="thread" x="572" y="570" width="104" height="46"/>
  <text class="tiny" x="624" y="590" text-anchor="middle">PC Register</text>
  <text class="tiny" x="624" y="608" text-anchor="middle">실행 위치</text>

  <rect class="thread" x="690" y="570" width="112" height="46"/>
  <text class="tiny" x="746" y="590" text-anchor="middle">Native Stack</text>
  <text class="tiny" x="746" y="608" text-anchor="middle">네이티브 호출</text>

  <text class="tiny" x="533" y="458" text-anchor="middle">모든 스레드 공유</text>
  <text class="tiny" x="628" y="558" text-anchor="middle">스레드마다 생성</text>

  <rect class="engine" x="884" y="374" width="244" height="268"/>
  <text class="label" x="1006" y="409" text-anchor="middle">Execution Engine</text>
  <text class="small" x="1006" y="441" text-anchor="middle">바이트코드 실행</text>
  <line class="muted-line" x1="910" y1="462" x2="1102" y2="462"/>

  <rect class="native" x="918" y="486" width="176" height="48"/>
  <text class="small" x="1006" y="516" text-anchor="middle">Interpreter</text>

  <rect class="native" x="918" y="552" width="176" height="48"/>
  <text class="small" x="1006" y="582" text-anchor="middle">JIT Compiler</text>

  <text class="tiny" x="1006" y="626" text-anchor="middle">자주 실행되는 코드를</text>
  <text class="tiny" x="1006" y="648" text-anchor="middle">네이티브 코드로 최적화</text>

  <path class="arrow" d="M 372 508 L 418 508"/>
  <path class="arrow" d="M 830 508 L 876 508"/>

  <rect class="gc" x="504" y="674" width="248" height="54"/>
  <text class="small" x="628" y="706" text-anchor="middle">Garbage Collector</text>
  <path class="dash" d="M 754 700 C 804 700 820 548 724 548"/>
  <text class="tiny" x="840" y="694" text-anchor="middle">참조되지 않는</text>
  <text class="tiny" x="840" y="716" text-anchor="middle">Heap 객체 정리</text>

  <path class="arrow" d="M 1006 642 L 1006 792"/>

  <rect class="box" x="852" y="792" width="308" height="72"/>
  <text class="label" x="1006" y="823" text-anchor="middle">OS / Hardware</text>
  <text class="small" x="1006" y="848" text-anchor="middle">운영체제와 실제 CPU 위에서 실행</text>

  <rect class="pill" x="148" y="684" width="224" height="44"/>
  <text class="small" x="260" y="712" text-anchor="middle">java 명령으로 JVM 시작</text>

  <path class="dash" d="M 260 684 C 260 660 250 656 250 642"/>
</svg>
